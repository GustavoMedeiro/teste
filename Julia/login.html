<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel da Patroa</title>
    <!-- Puxa o CSS do Admin que a gente já configurou -->
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body class="body-login">

    <div class="caixa-login">
        <h1 style="font-family: 'Permanent Marker', cursive; color: #63bce5; margin-bottom: 0.5rem; font-size: 2.5rem;">Área Restrita</h1>
        <p style="color: #b0c4de; margin-bottom: 2rem;">Acesso exclusivo da Patroa</p>
        
        <form id="form-login-admin">
            <input type="email" id="email" placeholder="E-mail do Studio" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit" class="btn-entrar" style="width: 100%; font-size: 1.1rem;">Entrar no Painel</button>
        </form>
    </div>

    <!-- Script de Autenticação com Dupla Checagem (Blindado!) -->
    <script type="module">
        import { auth, db } from './firebase-init.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        document.getElementById('form-login-admin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.querySelector('.btn-entrar');
            
            btn.innerText = "Conferindo credenciais...";
            btn.disabled = true;

            try {
                // 1. Tenta logar no sistema do Firebase Auth
                const credenciais = await signInWithEmailAndPassword(auth, email, senha);
                const usuarioLogado = credenciais.user;

                // 2. Vai no banco de dados conferir se tem a tag "admin"
                const docRef = doc(db, "usuarios", usuarioLogado.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().tipo === "admin") {
                    // É a patroa! Libera a catraca e manda pro painel.
                    window.location.href = 'index.html';
                } else {
                    // É cliente tentando dar golpe! Chuta pra fora e desloga.
                    await signOut(auth);
                    alert("⛔ Acesso Negado! Área restrita somente para a administração do Studio.");
                    btn.innerText = "Entrar no Painel";
                    btn.disabled = false;
                }

            } catch (error) {
                console.error("Erro no login:", error);
                alert("Eita! E-mail ou senha incorretos. Confere aí e tenta de novo.");
                btn.innerText = "Entrar no Painel";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
